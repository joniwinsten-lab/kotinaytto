# Aja migraatiot ja Edge Functions Kodinäyttö-projektiin.
#
# Pakolliset GitHub Secrets (Actions):
#   SUPABASE_ACCESS_TOKEN  – https://supabase.com/dashboard/account/tokens
#   SUPABASE_PROJECT_REF   – Dashboard → Project Settings → General → Reference ID
#
# Valinnainen:
#   SUPABASE_DB_PASSWORD   – vain jos haluat validoida Postgres-yhteyden linkissä.
#                            Dashboard ei näytä vanhaa salasanaa; vain "Reset database password".

name: Supabase deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/supabase-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Puuttuu SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "Puuttuu SUPABASE_PROJECT_REF"; exit 1; }

      - name: Link Supabase project
        run: |
          set -e
          if [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"
          else
            # Access token + tyhjä DB-salasana: CLI ohittaa Postgres-validoinnin (katso supabase link -docs).
            supabase link --project-ref "$SUPABASE_PROJECT_REF" --password ""
          fi

      - name: Push database migrations
        run: |
          if [ -n "${SUPABASE_DB_PASSWORD:-}" ]; then
            supabase db push --yes --password "$SUPABASE_DB_PASSWORD"
          else
            supabase db push --yes --password ""
          fi

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy sync-rss --yes
          supabase functions deploy sync-weather --yes
          supabase functions deploy photo-ingest --yes
          supabase functions deploy photo-delete --yes
