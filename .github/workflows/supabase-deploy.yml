# Aja migraatiot ja Edge Functions Kodinäyttö-projektiin.
#
# GitHub → Settings → Secrets → Actions:
#   SUPABASE_ACCESS_TOKEN  (tili: Access Tokens)
#   SUPABASE_PROJECT_REF   (Reference ID)
#   SUPABASE_DB_PASSWORD   (Project Settings → Database → Database password)
#
# project-ref -lippu poistui uudemmasta CLI:stä; linkataan ensin, sitten db push.

name: Supabase deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/supabase-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Puuttuu SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "Puuttuu SUPABASE_PROJECT_REF"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "Puuttuu SUPABASE_DB_PASSWORD (Database password)"; exit 1; }

      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Push database migrations
        run: supabase db push --yes

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy sync-rss --yes
          supabase functions deploy sync-weather --yes
          supabase functions deploy photo-ingest --yes
