# Aja migraatiot ja Edge Functions Kodinäyttö-projektiin.
# Vaatii GitHub-repon salaisuudet: SUPABASE_ACCESS_TOKEN, SUPABASE_PROJECT_REF.
#
# Project ref löytyy: Supabase Dashboard → Project Settings → General → Reference ID.

name: Supabase deploy

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - ".github/workflows/supabase-deploy.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Puuttuu SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "Puuttuu SUPABASE_PROJECT_REF"; exit 1; }

      - name: Push database migrations
        run: supabase db push --project-ref "$SUPABASE_PROJECT_REF"

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy sync-rss --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy sync-weather --project-ref "$SUPABASE_PROJECT_REF"
          supabase functions deploy photo-ingest --project-ref "$SUPABASE_PROJECT_REF"
