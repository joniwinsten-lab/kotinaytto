# Staattinen hallintasivusto GitHub Pagesille (Vite build → gh-pages -haara).
# Repo → Settings → Pages → Source: Branch gh-pages / root.

name: Web GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web-pages.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Joko VITE_* (käsin) tai olemassa olevat Supabase CLI -tokenit: haetaan anon Management API:sta.
      - name: Aseta VITE_SUPABASE_* (secretit tai Supabase API)
        env:
          VITE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_PAT: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -euo pipefail
          URL="${VITE_URL:-}"
          KEY="${VITE_KEY:-}"
          if [ -n "$URL" ] && [ -n "$KEY" ]; then
            echo "Käytössä VITE_SUPABASE_URL + VITE_SUPABASE_ANON_KEY (repository secrets)."
          else
            echo "Haetaan anon-avain Supabase Management API:lla (SUPABASE_ACCESS_TOKEN + SUPABASE_PROJECT_REF)."
            if [ -z "${SUPABASE_PAT:-}" ] || [ -z "${SUPABASE_REF:-}" ]; then
              echo "::error::Lisää joko VITE_SUPABASE_URL+VITE_SUPABASE_ANON_KEY TAI varmista että repossa on jo SUPABASE_ACCESS_TOKEN ja SUPABASE_PROJECT_REF (kuten Supabase deploy -workflow)."
              exit 1
            fi
            URL="https://${SUPABASE_REF}.supabase.co"
            RAW=$(curl -fsS "https://api.supabase.com/v1/projects/${SUPABASE_REF}/api-keys?reveal=true" \
              -H "Authorization: Bearer ${SUPABASE_PAT}" \
              -H "Accept: application/json")
            KEY=$(echo "$RAW" | jq -r '[.[] | select(.name == "anon")] | first | .api_key // empty')
            if [ -z "$KEY" ] || [ "$KEY" = "null" ]; then
              KEY=$(echo "$RAW" | jq -r '[.[] | select(.type == "legacy" and (.name | ascii_downcase | contains("anon")))] | first | .api_key // empty')
            fi
            if [ -z "$KEY" ] || [ "$KEY" = "null" ]; then
              echo "::error::Anon-avainta ei saatu API:sta. Lisää repository secret VITE_SUPABASE_ANON_KEY tai päivitä Supabase-tokenin oikeudet."
              exit 1
            fi
          fi
          echo "VITE_SUPABASE_URL=$URL" >> "$GITHUB_ENV"
          echo "VITE_SUPABASE_ANON_KEY=$KEY" >> "$GITHUB_ENV"

      - name: Build
        working-directory: web
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm ci && npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
