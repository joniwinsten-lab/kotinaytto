# Staattinen hallintasivusto GitHub Pagesille (Vite build → gh-pages -haara).
# Repo → Settings → Pages → Source: Branch gh-pages / root.

name: Web GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/web-pages.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Varmista Supabase-secrets (GitHub Pages -buildiin)
        env:
          VITE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$VITE_URL" ] || [ -z "$VITE_KEY" ]; then
            echo "::error::Puuttuvat Actions-secretit. Lisää repoon: Settings → Secrets and variables → Actions → New repository secret:"
            echo "  • VITE_SUPABASE_URL   (esim. https://xxxx.supabase.co)"
            echo "  • VITE_SUPABASE_ANON_KEY   (Supabase → Project Settings → API → anon public)"
            echo "Sen jälkeen: Actions → Web GitHub Pages → Run workflow."
            exit 1
          fi

      - name: Build
        working-directory: web
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # GitHub Pages project site: https://<org>.github.io/<repo>/
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm ci && npm run build

      - name: Publish to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
